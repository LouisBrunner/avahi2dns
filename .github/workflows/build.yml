name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: LouisBrunner/.github/.github/workflows/lint-go.yml@main
    with:
      run: go test -v ./...

  cross-build:
    name: Cross-compile
    runs-on: ubuntu-24.04
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - label: armv5
            arch: arm
            arm: 5
          - label: armv6
            arch: arm
            arm: 6
          - label: armv7
            arch: arm
            arm: 7
          - label: arm64
            arch: arm64
          - label: amd64
            arch: amd64
          - label: i386
            arch: 386
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -v ./...
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          GOARM: ${{ matrix.arm }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: avahi2dns-linux-${{ matrix.label }}
          path: avahi2dns
